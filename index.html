      html, body, #root { margin:0; padding:0; background:#0e0e0e; }
      #app-shell {

        background: #0e0e0e; color: #f0e6d0;

      }
      #app-shell-nav {
        width: 270px; min-width: 270px;
        background: #0e0e0e;
        border-right: 1px solid rgba(201,148,42,0.2);
        padding: 20px 16px;
        display: flex; flex-direction: column; gap: 8px;
      }
      #app-shell-brand {
        display: flex; align-items: center; gap: 10px;

      }
      #app-shell-brand span { font-size: 2rem; }
      .app-shell-nav-item {
        height: 44px; border-radius: 10px;
        background: rgba(201,148,42,0.06);
      }
      #app-shell-main {
        flex: 1; padding: 28px 32px;
        display: flex; flex-direction: column; gap: 20px;
        overflow: hidden;
      }
      #app-shell-greeting {
        font-size: 2.2rem; font-weight: 600;
        color: #c9942a; letter-spacing: 0.04em;
      }
      .app-shell-card {
        height: 72px; border-radius: 14px;
        background: rgba(201,148,42,0.05);
        border: 1px solid rgba(201,148,42,0.12);
      }
      .app-shell-row { display: flex; gap: 16px; }
      .app-shell-row .app-shell-card { flex: 1; }
      @media (max-width: 768px) {
        #app-shell-nav { display: none; }
        #app-shell-greeting { font-size: 1.6rem; }
      }
